# Model IDs, prompts, and per-capability parameters.
#
# Business logic NEVER references a model ID directly — only capability names.
# When Google deprecates a model, the change is a config edit, not a code edit.
# This is the abstraction layer that absorbs Google's deprecation cadence.

vertex_ai:
  # project_id is auto-read from the service account JSON if set.
  # location should be 'global' for most Gemini models on Vertex AI; some
  # models are region-pinned and may only work in 'us-central1' or 'us-east1'.
  # Override via env: PROJECT_ID, GEMINI_LOCATION.
  project_id: null
  location: global

logging:
  level: INFO

retry:
  attempts: 3
  initial_wait_seconds: 1.5
  max_wait_seconds: 30

# Pricing used to estimate cost per call. Token counts shown in the UI are
# real (from the API response); dollar amounts here are list-price
# estimates. `verified: true` means confirmed against Google's official
# Vertex AI pricing page as of `last_verified`; `false` means it couldn't
# be confirmed and should be checked against Cloud Billing before trusting.
pricing:
  last_verified: "2026-07-02"
  source_url: "https://cloud.google.com/vertex-ai/generative-ai/pricing"

  models:
    gemini-3.1-flash-image:    # Nano Banana 2 — current project default
      verified: true
      unit: per_million_tokens
      input: 0.50               # combined text/image/video input rate
      output_text: 3.00
      output_image: 60.00

    gemini-3-pro-image:        # Nano Banana Pro
      verified: true
      unit: per_million_tokens
      input: 2.00
      output_text: 12.00
      output_image: 120.00

    gemini-2.5-flash-image:    # Nano Banana (original) — not on the official
      verified: false          # pricing page; input/output_text below per an
      unit: per_million_tokens # LLM-sourced estimate, output_image still a
      input: 0.30              # placeholder (no confident figure given for it)
      output_text: 2.50
      output_image: 60.00

    imagen-3.0-capability-001:  # billed per-image, not per-token
      # Rate reported by an LLM query (not an official Google source or
      # Cloud Billing), so still unverified -- but a real estimate is more
      # honest than showing $0.00 for an unsupported unit.
      verified: false
      unit: per_image
      rate_per_image: 0.040

    gemini-2.5-flash:
      verified: true
      unit: per_million_tokens
      input_text: 0.30
      input_image: 0.30
      input_audio: 1.00
      input_video: 1.00        # not separately listed — using the audio rate
      output_text: 2.50

    gemini-2.5-flash-preview-tts:  # not on the official pricing page; secondary source
      verified: false
      unit: per_million_tokens
      input_text: 0.50
      output_audio: 10.00

    # Veo billing is per second of generated video, not per token. None of
    # these could be confirmed on the official Vertex pricing page or Cloud
    # Billing (no access) -- figures are an LLM-sourced estimate. Confirm
    # against Cloud Billing before relying on them for real budget decisions.
    veo-3.1-generate-preview:
      verified: false
      unit: per_second_video
      rate_standard: 0.40
      rate_4k: 0.60
    veo-3.1-fast-generate-preview:
      verified: false
      unit: per_second_video
      rate_standard: 0.15
      rate_4k: 0.30
    veo-3.1-lite-generate-preview:
      verified: false
      unit: per_second_video
      rate_standard: 0.05

capabilities:

  audio_question_generation:
    # Topic OR pasted passage -> narrated audio + text comprehension questions.
    #
    # Two input modes (chosen in the UI):
    #   topic:   a short phrase. Gemini writes an educational passage on it
    #            first, then everything proceeds the same as 'passage' mode.
    #   passage: the user supplies the full passage/script text directly —
    #            no content-generation step, narration + questions only.
    #
    # Reuses the same TTS voice preset as the other audio capabilities and
    # the same question schema as video_to_questions. Output questions are
    # TEXT (read on screen), not narrated.
    text_model: gemini-2.5-flash
    available_text_models: [gemini-2.5-flash, gemini-2.5-pro]
    tts_model: gemini-2.5-flash-preview-tts
    available_tts_models: [gemini-2.5-flash-preview-tts, gemini-2.5-pro-preview-tts]
    voice_preset: Kore
    available_voices: [Kore, Puck, Charon, Fenrir, Aoede, Zephyr, Leda, Orus]
    sample_rate_hz: 24000
    default_question_count: 5
    default_question_type: mcq      # mcq | short_answer | conceptual
    default_level: undergraduate    # school | undergraduate | postgraduate
    passage_word_count: 150
    passage_instruction: |
      Write a clear, factually accurate educational passage of about
      {word_count} words on the following topic, suitable for reading aloud
      as a listening-comprehension exercise:

      "{topic}"

      Write only the passage text. No title, no headers, no commentary,
      no markdown formatting.
    questions_instruction: |
      You are an experienced subject-matter expert generating exam-quality
      listening-comprehension questions.

      Based strictly on the passage below, generate {count} {question_type}
      questions at the {level} level. Do not invent facts not in the passage.

      Passage:
      """
      {passage}
      """

      Return ONLY a JSON object matching this schema:
      {{
        "questions": [
          {{
            "id": <int>,
            "type": "<question_type>",
            "stem": "<the question text>",
            "options": ["A...", "B...", "C...", "D..."],   // mcq only
            "answer": "<the correct answer>",
            "explanation": "<one-sentence rationale>",
            "difficulty": "easy" | "medium" | "hard"
          }}
        ]
      }}

  image_enhance:
    # Nano Banana 2 — confirmed working on this Vertex AI project.
    # available_models populates the UI's model dropdown; model is the default.
    model: gemini-3.1-flash-image
    available_models: [gemini-3.1-flash-image, gemini-3-pro-image, gemini-2.5-flash-image, imagen-3.0-capability-001]
    resolution: "2K"
    available_resolutions: ["1K", "2K", "4K"]
    default_instruction: |
      Re-render this hand-drawn diagram as a clean, professional illustration
      suitable for use in a printed question paper.

      Hard constraints — these MUST be preserved exactly:
      - Every label, number, variable, and unit must appear unchanged.
      - All geometric relationships, angles, proportions, and connections must
        remain the same as in the source.
      - Do not add, remove, paraphrase, or correct any text or symbol.

      Style:
      - Clean black lines on a white background.
      - Consistent line weight.
      - Crisp, legible typography for any labels.
      - No shading, decoration, or stylistic flourishes that were not in the
        original sketch.

  audio_text_to_speech:
    # Gemini TTS path. Voice preset is a placeholder — needs sign-off from
    # whoever owns the English curriculum before going to real users.
    model: gemini-2.5-flash-preview-tts
    available_models: [gemini-2.5-flash-preview-tts, gemini-2.5-pro-preview-tts]
    voice_preset: Kore
    available_voices: [Kore, Puck, Charon, Fenrir, Aoede, Zephyr, Leda, Orus]
    output_format: wav
    sample_rate_hz: 24000
    default_instruction: |
      Read the following script clearly and at a measured, neutral pace,
      suitable for a listen-and-repeat English assessment. Pronounce each
      word precisely. Pause naturally at punctuation. Do not add commentary,
      sound effects, or any text not in the script.

  audio_to_audio:
    # Hybrid pipeline: ASR (audio in, text out) -> optional cleanup -> TTS.
    # Original speaker's voice is NOT preserved — output uses the voice preset.
    asr_model: gemini-2.5-flash
    available_asr_models: [gemini-2.5-flash, gemini-2.5-pro]
    tts_model: gemini-2.5-flash-preview-tts
    available_tts_models: [gemini-2.5-flash-preview-tts, gemini-2.5-pro-preview-tts]
    voice_preset: Kore
    available_voices: [Kore, Puck, Charon, Fenrir, Aoede, Zephyr, Leda, Orus]
    output_format: wav
    sample_rate_hz: 24000
    cleanup_transcript: true
    transcribe_instruction: |
      Transcribe this audio verbatim. Output only the spoken words with
      standard punctuation. Do not add commentary, speaker labels, or
      timestamps. If the audio contains multiple languages, transcribe in
      the language being spoken.
    cleanup_instruction: |
      Lightly clean up the following transcript for use as a TTS script:
      - Remove obvious filler words (um, uh, you know, like).
      - Fix punctuation and capitalisation.
      - Do not paraphrase, summarise, or change the meaning of any sentence.
      - Do not add any content that is not in the transcript.
      Return ONLY the cleaned transcript, with no commentary or preamble.

  video_to_questions:
    # Video understanding -> structured question/answer JSON.
    model: gemini-2.5-flash
    available_models: [gemini-2.5-flash, gemini-2.5-pro, gemini-3.5-flash]
    default_question_count: 5
    default_question_type: mcq      # mcq | short_answer | conceptual
    default_level: undergraduate    # school | undergraduate | postgraduate
    default_instruction: |
      You are an experienced subject-matter expert generating exam-quality
      questions from the video content provided.

      Generate {count} {question_type} questions at the {level} level based
      strictly on what the video covers. Do not invent facts not in the video.

      Return ONLY a JSON object matching this schema:
      {{
        "questions": [
          {{
            "id": <int>,
            "type": "<question_type>",
            "stem": "<the question text>",
            "options": ["A...", "B...", "C...", "D..."],   // mcq only
            "answer": "<the correct answer>",
            "explanation": "<one-sentence rationale>",
            "timestamp": "MM:SS",
            "difficulty": "easy" | "medium" | "hard"
          }}
        ]
      }}

  video_enhance:
    # Conventional video pipeline (ffmpeg) does the actual enhancement;
    # Gemini's role is transcription (for captions) and optional issue
    # flagging. SME's original voice is preserved — we denoise it, we
    # don't regenerate it as TTS.
    analysis_model: gemini-2.5-flash
    available_models: [gemini-2.5-flash, gemini-2.5-pro, gemini-3.5-flash]
    output_format: mp4
    pipeline:
      stabilize: true                # ffmpeg deshake filter
      light_color_correction: true   # subtle saturation + contrast bump
      audio_denoise: true            # ffmpeg afftdn filter
      auto_captions: true            # Gemini transcribes; burn SRT into video
      flag_issues: false             # optional Gemini analysis pass
    encoder:
      video_codec: libx264
      preset: medium                 # ultrafast | superfast | veryfast | faster | fast | medium | slow
      available_presets: [ultrafast, superfast, veryfast, faster, fast, medium, slow]
      crf: 22                        # lower = better quality, larger file
      audio_codec: aac
      audio_bitrate: 160k
    captions:
      font_size: 20
      max_chars_per_line: 42
    transcript_instruction: |
      Transcribe this video's spoken content as a JSON object suitable for
      generating subtitles. Return ONLY JSON in this exact shape, with no
      preamble or commentary:

      {
        "segments": [
          {"start": "MM:SS.mmm", "end": "MM:SS.mmm", "text": "..."},
          ...
        ]
      }

      Rules:
      - Each segment is one short, readable subtitle line (max ~10 words).
      - Timestamps must be in MM:SS.mmm format with millisecond precision.
      - Segments must not overlap and must be in chronological order.
      - Transcribe verbatim — do not paraphrase, summarise, or omit content.

  # ---------------------------------------------------------------------
  # Generate-from-scratch capabilities. Unlike the enhance/analyse tabs
  # above (which transform SME-supplied content), these take a structured
  # prompt -- assessment metadata plus media-specific attributes -- and
  # generate new media from nothing. See iav/capabilities/prompt_schema.py
  # for the shared attribute fields and validation.
  # ---------------------------------------------------------------------

  image_generate:
    model: gemini-3.1-flash-image
    available_models: [gemini-3.1-flash-image, gemini-3-pro-image, gemini-2.5-flash-image]
    resolution: "2K"
    available_resolutions: ["1K", "2K", "4K"]
    output_format: png
    available_formats: [png, jpeg]
    visual_types: [Diagram, Scenario, Chart]
    styles: [Flat illustration, Realistic, Line art, Watercolor, 3D render, Infographic]
    prompt_template: |
      Generate a {visual_type}, in a {style} style, suitable for use in an
      exam question.

      {common_block}

      {free_text}

      Constraints:
      - No watermarks, signatures, or overlaid text unless explicitly requested.
      - Content must be factually accurate and age-appropriate for the target audience.

  audio_generate:
    # Two input modes (chosen in the UI), same pattern as
    # audio_question_generation:
    #   topic:  a short brief. Gemini writes the actual narration script
    #           first (content_instruction below), then narrates that.
    #   script: the user pastes the exact final script -- narrated verbatim,
    #           no content-generation step.
    model: gemini-2.5-flash-preview-tts
    available_models: [gemini-2.5-flash-preview-tts, gemini-2.5-pro-preview-tts]
    text_model: gemini-2.5-flash
    available_text_models: [gemini-2.5-flash, gemini-2.5-pro]
    voice_preset: Kore
    available_voices: [Kore, Puck, Charon, Fenrir, Aoede, Zephyr, Leda, Orus]
    sample_rate_hz: 24000
    # Gemini TTS always returns raw PCM, wrapped as WAV. mp3 is a real
    # conversion via ffmpeg (same dependency video_enhance already needs),
    # not just a label -- if ffmpeg isn't on PATH, wav is returned instead
    # and the result says so rather than silently mislabelling the file.
    output_format: wav
    available_formats: [wav, mp3]
    speaker_modes: [Single speaker, Multiple speakers]
    accents: [Neutral, US, UK, Indian, Australian]
    speeds: [Slow, Normal, Fast]
    tones: [Neutral, Formal, Friendly, Serious, Enthusiastic]
    lengths: ["Short (~30s)", "Medium (~1-2 min)", "Long (~3-5 min)"]
    length_word_counts:
      "Short (~30s)": 75
      "Medium (~1-2 min)": 200
      "Long (~3-5 min)": 500
    content_instruction: |
      Write a clear, factually accurate narration script of about
      {word_count} words, suitable for reading aloud as an educational
      explanation.

      {common_block}

      Topic / brief: {free_text}

      Write only the narration script text. No title, no headers, no stage
      directions, no markdown formatting.
    prompt_template: |
      Narrate the following content in a {tone} tone, at a {speed} pace, with
      a {accent} accent. Target length: {length}.

      {common_block}

      Content:
      {free_text}

  video_generate:
    model: veo-3.1-generate-preview
    available_models: [veo-3.1-generate-preview, veo-3.1-fast-generate-preview, veo-3.1-lite-generate-preview]
    # Veo has historically had narrower regional availability than the
    # text/image/audio models. "global" (used everywhere else in this app)
    # returned 404 NOT_FOUND for every Veo tier on this project -- pinning
    # video generation to a specific region as a first thing to try.
    # If this still 404s, check Vertex AI -> Model Garden for Veo access
    # on this project; it may need a separate allowlist request entirely.
    location: us-central1
    available_locations: [us-central1, us-east4, europe-west4, global]
    resolution: "720p"
    available_resolutions: ["720p", "1080p"]
    output_format: mp4   # the only format Veo returns -- no conversion needed
    duration_seconds: 8
    available_durations_seconds: [4, 6, 8]
    video_types: [Scenario Based, Demonstration, Explanatory walkthrough]
    generate_audio: true
    poll_interval_seconds: 10
    poll_timeout_seconds: 360
    prompt_template: |
      A {video_type} video for an assessment question.

      {common_block}

      Scenario: {free_text}
